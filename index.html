<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gaming Tournament Registration</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body {
    background-color: #0a0a0a;
    color: white;
}

/* Background */
.tournament-container {
    background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url(background.png);
    background-size: cover;
    background-position: center;
    min-height: 100vh;
    padding: 20px;
}

/* Info bar */
.info-bar {
    border: 2px solid #8a2be2;
    background: rgba(138, 43, 226, 0.1);
    padding: 15px;
    margin: 20px auto;
    max-width: 900px;
    text-align: center;
}

/* Form */
.form-wrapper {
    display: flex;
    justify-content: center;
    margin-top: 40px;
}

.reg-form {
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
    padding: 30px;
    border-radius: 8px;
    width: 100%;
    max-width: 600px;
}

.reg-form h2 {
    text-align: center;
    margin-bottom: 20px;
}

/* Inputs */
input, select {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    margin-bottom: 15px;
    border: none;
    border-radius: 4px;
    background: rgba(255,255,255,0.2);
    color: white;
}

label {
    font-weight: bold;
}

.radio-group {
    display: flex;
    gap: 20px;
    margin-bottom: 15px;
}

/* Button */
button {
    width: 100%;
    padding: 12px;
    background: linear-gradient(135deg, #ff4bb0, #ffb703);
    border: none;
    color: white;
    font-size: 16px;
    cursor: pointer;
    border-radius: 6px;
    transition: 0.3s;
}

button:hover {
    transform: translateY(-4px) scale(1.03);
    box-shadow: 0 10px 25px rgba(255, 75, 176, 0.4);
}

button:active {
    transform: scale(0.97);
}

#success {
    text-align: center;
    margin-top: 10px;
}

/* ===== ABOUT SECTION ===== */
.about {
    margin-top: 80px;
    padding: 50px 20px;
}

.about-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 25px;
    max-width: 1100px;
    margin: auto;
}

.card {
    position: relative;
    background: linear-gradient(145deg, #0f172a, #020617);
    border-radius: 15px;
    padding: 30px;
    text-align: center;
    overflow: hidden;
    transition: 0.4s;
}

.card::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 15px;
    padding: 2px;
    background: linear-gradient(45deg, #ff4bb0, #00c3ff, #00ff9d);
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
}

.card:hover {
    transform: translateY(-10px) scale(1.03);
    box-shadow: 0 20px 40px rgba(0,0,0,0.6);
}

.card h2 {
    margin-bottom: 10px;
    color: #ffb703;
}

.card p {
    color: #ccc;
}

/* Animation */
.hidden {
    opacity: 0;
    transform: translateY(40px);
    transition: 0.8s;
}

.show {
    opacity: 1;
    transform: translateY(0);
}

/* Mobile */
@media(max-width:800px){
    .about-grid {
        grid-template-columns: 1fr;
    }
}
</style>
</head>

<body>

<div class="tournament-container">

<div class="info-bar">
    Please secure your ticket by registering.
</div>

<div class="form-wrapper">
<form name="submit-to-google-sheet" class="reg-form">

<h2>Gaming Tournament Registration</h2>

<label>Application Type</label>
<select id="participation" name="participation" required>
    <option value="">-- Select --</option>
    <option value="solo">Solo</option>
    <option value="team">Team</option>
</select>

<!-- SOLO -->
<div id="soloFields" style="display:none;">
    <input type="text" name="name" placeholder="Name">
    <input type="text" name="handler" placeholder="Game Handler">
    <input type="tel" name="phone" placeholder="Phone">
    <input type="email" name="email" placeholder="Email">
    <input type="number" name="age" placeholder="Age">
</div>

<!-- TEAM -->
<div id="teamFields" style="display:none;">
    <input type="text" name="team_name" placeholder="Team Name">
    <input type="text" name="member1" placeholder="Member 1">
    <input type="text" name="member2" placeholder="Member 2">
    <input type="tel" name="team_phone" placeholder="Phone">

    <select name="team_gender">
        <option value="">Team Type</option>
        <option>Male & Male</option>
        <option>Female & Female</option>
        <option>Mixed</option>
    </select>

    <input type="number" name="team_age1" placeholder="Age Member 1">
    <input type="number" name="team_age2" placeholder="Age Member 2">
</div>

<button type="submit">Register</button>
<span id="success"></span>

</form>
</div>

<!-- ABOUT -->
<section class="about">
<div class="about-grid">

<div class="card hidden">
<h2>DUOS</h2>
<p>Join with a partner and compete for R500. Solo players enter free.</p>
</div>

<div class="card hidden">
<h2>HOW IT WORKS</h2>
<p>Enter solo for R100 and win up to R2000.</p>
</div>

<div class="card hidden">
<h2>GAMERS</h2>
<p>Play Fortnite, COD, Roblox & more for free.</p>
</div>

</div>
</section>

</div>

<script>
// Elements
const participation = document.getElementById("participation");
const solo = document.getElementById("soloFields");
const team = document.getElementById("teamFields");
const form = document.forms['submit-to-google-sheet'];
const msg = document.getElementById("success");

const soloInputs = solo.querySelectorAll("input, select");
const teamInputs = team.querySelectorAll("input, select");

// Toggle required
function toggleFields(inputs, enable){
    inputs.forEach(input=>{
        if(enable){
            input.setAttribute("required", "true");
        } else {
            input.removeAttribute("required");
        }
    });
}

// Switch
participation.addEventListener("change", ()=>{
    if(participation.value === "solo"){
        solo.style.display = "block";
        team.style.display = "none";

        toggleFields(soloInputs, true);
        toggleFields(teamInputs, false);
        teamInputs.forEach(i => i.value = "");

    } else if(participation.value === "team"){
        solo.style.display = "none";
        team.style.display = "block";

        toggleFields(soloInputs, false);
        toggleFields(teamInputs, true);
        soloInputs.forEach(i => i.value = "");

    } else {
        solo.style.display = "none";
        team.style.display = "none";

        toggleFields(soloInputs, false);
        toggleFields(teamInputs, false);
    }
});

// Submit
const scriptURL = 'https://script.google.com/macros/s/AKfycbypDE_TqV6jGmzYnGIBpRXVIG66ghthraFF0FUho9SOLYZlXkDTZEIIrzBcGPZTmzw2NQ/exec';

form.addEventListener('submit', e=>{
    e.preventDefault();

    msg.innerHTML = "⏳ Sending...";

    fetch(scriptURL, {
        method:'POST',
        body:new FormData(form)
    })
    .then(()=>{
        msg.innerHTML = "✅ Registered successfully!";
        msg.style.color = "#00ff9d";

        form.reset();
        solo.style.display = "none";
        team.style.display = "none";

        toggleFields(soloInputs, false);
        toggleFields(teamInputs, false);
    })
    .catch(()=>{
        msg.innerHTML = "❌ Error submitting form";
        msg.style.color = "red";
    });
});

// Scroll animation
const observer = new IntersectionObserver(entries=>{
    entries.forEach(entry=>{
        if(entry.isIntersecting){
            entry.target.classList.add("show");
        }
    });
});

document.querySelectorAll(".hidden").forEach(el=>observer.observe(el));
</script>

</body>
</html>
